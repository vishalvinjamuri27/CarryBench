# Default Colab-GPU config: ~5-10M parameter model, trains in a few minutes
# on a single Colab GPU (T4/A100/etc).

seed: 0

vocab_size: auto
max_seq_len: auto

d_model: 256
n_layers: 6
n_heads: 8
d_ff: 1024
dropout: 0.0

batch_size: 256
learning_rate: 0.0003
weight_decay: 0.01
train_steps: 2000
eval_every: 100

n_train: 200000
n_eval: 2000
n_test: 2000
n_carry_heavy: 2000
